<!DOCTYPE html>
<html>
<head>
  <title>GameHub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<!-- 🎬 Background Video -->
<video autoplay muted loop playsinline class="bg-video">
  <source src="Background/bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- 🔐 Login Box -->
<div class="auth-container">
  <h1>GameHub</h1>

  <!-- Floating Inputs -->
  <div class="input-group">
    <input type="text" id="username" required>
    <label>Username</label>
  </div>

  <div class="input-group">
    <input type="password" id="password" required>
    <label>Password</label>
  </div>

  <!-- Confirm Password (hidden by default) -->
  <div class="input-group" id="confirmGroup" style="display: none;">
    <input type="password" id="confirmPassword">
    <label>Confirm Password</label>
  </div>

  <button id="actionBtn" onclick="handleAction()">Login</button>

  <p id="toggleText">
    Don't have an account?
    <span onclick="toggleMode()">Register</span>
  </p>
</div>

<!-- GSAP CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="auth.js"></script>

</body>
</html>
